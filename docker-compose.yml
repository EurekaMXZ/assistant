name: assistant

services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: assistant
      POSTGRES_USER: assistant
      POSTGRES_PASSWORD: assistant
      PGDATA: /var/lib/postgresql/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  kafka:
    image: apache/kafka:3.9.0
    restart: unless-stopped
    environment:
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "16"
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:29092"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 10s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-assistantminio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-assistantminio123}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: migrate
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
        GOSUMDB: ${GOSUMDB:-sum.golang.org}
        HTTP_PROXY: ${DOCKER_HTTP_PROXY:-}
        HTTPS_PROXY: ${DOCKER_HTTPS_PROXY:-}
        ALL_PROXY: ${DOCKER_ALL_PROXY:-}
        NO_PROXY: ${DOCKER_NO_PROXY:-}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://assistant:assistant@postgres:5432/assistant?sslmode=disable
      MIGRATIONS_PATH: file:///app/db/migrations
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: api
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
        GOSUMDB: ${GOSUMDB:-sum.golang.org}
        HTTP_PROXY: ${DOCKER_HTTP_PROXY:-}
        HTTPS_PROXY: ${DOCKER_HTTPS_PROXY:-}
        ALL_PROXY: ${DOCKER_ALL_PROXY:-}
        NO_PROXY: ${DOCKER_NO_PROXY:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_HOST: 0.0.0.0
      PORT: 8080
      SHUTDOWN_TIMEOUT: 10s
      DATABASE_URL: postgres://assistant:assistant@postgres:5432/assistant?sslmode=disable
      REDIS_ADDR: redis:6379
      MINIO_ENDPOINT: minio:9000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  nginx:
    image: nginx:1.28-alpine
    depends_on:
      api:
        condition: service_started
      frontend:
        condition: service_healthy
    ports:
      - "${NGINX_HOST_PORT:-8080}:8080"
    volumes:
      - ./deploy/nginx/api.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api/v1
        HTTP_PROXY: ${DOCKER_HTTP_PROXY:-}
        HTTPS_PROXY: ${DOCKER_HTTPS_PROXY:-}
        ALL_PROXY: ${DOCKER_ALL_PROXY:-}
        NO_PROXY: ${DOCKER_NO_PROXY:-}
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: worker
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
        GOSUMDB: ${GOSUMDB:-sum.golang.org}
        HTTP_PROXY: ${DOCKER_HTTP_PROXY:-}
        HTTPS_PROXY: ${DOCKER_HTTPS_PROXY:-}
        ALL_PROXY: ${DOCKER_ALL_PROXY:-}
        NO_PROXY: ${DOCKER_NO_PROXY:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SHUTDOWN_TIMEOUT: 10s
      DATABASE_URL: postgres://assistant:assistant@postgres:5432/assistant?sslmode=disable
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: kafka:29092
      KAFKA_WORKFLOW_TOPIC: assistant.workflow
      KAFKA_CONSUMER_GROUP: assistant-workers
      MINIO_ENDPOINT: minio:9000
      MINIO_REGION: us-east-1
      MINIO_BUCKET: ${MINIO_BUCKET:-assistant}
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-assistantminio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-assistantminio123}
      HTTP_PROXY: ${DOCKER_HTTP_PROXY:-}
      HTTPS_PROXY: ${DOCKER_HTTPS_PROXY:-}
      ALL_PROXY: ${DOCKER_ALL_PROXY:-}
      NO_PROXY: ${DOCKER_NO_PROXY:-}
      WORKER_POLL_INTERVAL: 2s
      WORKER_LEASE_TIMEOUT: 2m
      WORKER_CONCURRENCY: 4
      OUTBOX_BATCH_SIZE: 100
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prompts:/app/prompts:ro
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
